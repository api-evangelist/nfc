aid: nfc
name: NFC
description: >-
  Near Field Communication (NFC) is a set of communication protocols that enable
  two electronic devices to establish communication by bringing them within a few
  centimeters of each other. NFC is commonly used for contactless payments,
  data sharing, and device pairing.
