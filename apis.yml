aid: nfc
name: NFC (Near Field Communication)
description: >-
  Near Field Communication (NFC) is a set of short-range wireless communication
  protocols that enable two electronic devices to establish communication by
  bringing them within a few centimeters of each other. NFC is governed by the
  NFC Forum and standardized through ISO/IEC 18092 and ISO/IEC 14443. Common
  applications include contactless payments (Apple Pay, Google Pay), transit
  ticketing, access control, device pairing, smart posters, and secure
  identification. NFC defines several technical specifications including NDEF
  (data exchange format), NCI (controller interface), LLCP (link layer), SNEP
  (data exchange), and the Tag Type 1-5 operation specifications.
